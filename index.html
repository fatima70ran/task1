<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think Big - Live Simply</title>
    <!-- ربط ملف التنسيقات الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. النافبار (شريط التنقل) -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-top">Think Big</span>
            <span class="logo-bottom">LIVE SIMPLY</span>
        </div>
        
        <!-- زر الهامبرغر الذي سيظهر في الموبايل فقط -->
        <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- قائمة الروابط الرئيسية -->
        <nav class="nav-links" id="nav-menu">
            <a href="#">About</a>
            <a href="#">Offerings</a>
            <a href="#">Blog</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- 2. قسم الهيرو السفلي لملء الصفحة وتجربة التجاوب -->
    <section class="hero-section">
        <div class="hero-image-side">
            <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?q=80&w=1000" alt="Landscape">
        </div>
        <div class="hero-text-side">
            <div class="text-content">
                <h2>Permaculture skills and lifestyle design for a simpler, more sustainable life.</h2>
                <div class="shaped-image-container">
                    <img src="https://images.unsplash.com/photo-1473448912268-202a19802d99?q=80&w=600" alt="Vegetation">
                </div>
            </div>
        </div>
    </section>

    <!-- ربط ملف الجافا سكريبت في نهاية الـ body -->
    <script src="script.js"></script>
</body>
</html>
